<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEM Simulation Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <h1>STEM Simulation Hub</h1>
        <nav class="module-nav" aria-label="Simulation modules">
          <button class="module-nav-btn active" data-module-nav="truss">Truss CAD</button>
          <button class="module-nav-btn" data-module-nav="projectile">Ballistics</button>
          <button class="module-nav-btn" data-module-nav="orbital">Orbital</button>
        </nav>
      </div>
      <div class="topbar-actions">
        <button id="analyzeBtn" class="primary-btn">Run Analysis</button>
        <button id="toggleInspectBtn">Inspect Panel</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="left-sidebar" aria-label="Simulation controls">
        <section class="panel-card">
          <h2>Tools</h2>
          <div class="tool-grid">
            <button class="tool-btn active" data-tool="select">Select</button>
            <button class="tool-btn" data-tool="node">Add Node</button>
            <button class="tool-btn" data-tool="member">Add Member</button>
            <button class="tool-btn" data-tool="delete">Delete</button>
          </div>
        </section>

        <section class="panel-card">
          <h3>Actions</h3>
          <div class="action-stack">
            <button id="resetBtn" class="action-btn">Reset Layout</button>
            <button id="exampleBtn" class="action-btn">Load Example</button>
          </div>
        </section>

        <section class="panel-card">
          <h3>Analysis</h3>
          <div id="analysisSummary" class="stat-list" aria-live="polite"></div>
        </section>
      </aside>

      <main class="canvas-area" aria-label="Interactive simulation workspace">
        <div class="canvas-toolbar">
          <div class="hint">Click into the drawing area to place nodes, then connect two nodes to build a member.</div>
          <div class="tag" id="toolIndicator">Tool: Select</div>
        </div>
        <div class="canvas-wrap">
          <canvas id="trussCanvas" width="900" height="560"></canvas>
        </div>
      </main>

      <aside id="inspectionPanel" class="inspect-panel" aria-label="Inspection panel">
        <div class="inspect-header">
          <strong>Inspection</strong>
          <button id="closeInspectBtn">Close</button>
        </div>
        <div id="inspectionContent" class="inspect-content"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
